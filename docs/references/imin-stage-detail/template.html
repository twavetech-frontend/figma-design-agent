<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8">
<title>아임인 스테이지 상세</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

:root {
  --brand-25:#fafaff; --brand-50:#f4f3ff; --brand-100:#ebe9fe; --brand-200:#d9d6fe;
  --brand-300:#bdb4fe; --brand-400:#9b8afb; --brand-500:#7a5af8; --brand-600:#6938ef;
  --brand-700:#5925dc; --brand-800:#4a1fb8; --brand-900:#3e1c96; --brand-950:#27115f;

  --gray-25:#fdfdfd; --gray-50:#fafafa; --gray-100:#f5f5f5; --gray-200:#e9eaeb;
  --gray-300:#d5d7da; --gray-400:#a4a7ae; --gray-500:#717680; --gray-600:#535862;
  --gray-700:#414651; --gray-800:#252b37; --gray-900:#181d27; --gray-950:#0a0d12;

  --success-500:#17b26a; --success-600:#079455; --success-700:#067647;

  --fg1:#181d27; --fg2:#414651; --fg3:#535862; --fg4:#717680; --fg-white:#fff;
  --fg-brand:#6938ef; --fg-brand-alt:#5925dc;
  --fg-error:#d92d20; --fg-warning:#dc6803; --fg-success:#079455;

  --bg-primary:#fff; --bg-secondary:#fafafa; --bg-tertiary:#f5f5f5; --bg-quaternary:#e9eaeb;
  --bg-brand-primary:#f4f3ff; --bg-brand-secondary:#ebe9fe; --bg-brand-solid:#6938ef;

  --border-primary:#d5d7da; --border-secondary:#e9eaeb; --border-tertiary:#f5f5f5;
  --border-brand:#7a5af8;

  --shadow-xs: 0 1px 2px 0 rgba(10,13,18,.05);
  --shadow-sm: 0 1px 3px 0 rgba(10,13,18,.10), 0 1px 2px -1px rgba(10,13,18,.10);
  --shadow-md: 0 4px 6px -1px rgba(10,13,18,.10), 0 2px 4px -2px rgba(10,13,18,.06);
  --shadow-lg: 0 12px 16px -4px rgba(10,13,18,.08), 0 4px 6px -2px rgba(10,13,18,.03);

  --radius-xs:4px; --radius-sm:6px; --radius-md:8px; --radius-lg:10px;
  --radius-xl:12px; --radius-2xl:16px; --radius-3xl:20px; --radius-4xl:24px; --radius-full:9999px;

* { box-sizing: border-box; }
body { margin:0; font-family: var(--font-body); color: var(--fg1); -webkit-font-smoothing: antialiased; }

<style>
  html, body { margin: 0; padding: 0; background: #efeff3; min-height: 100vh; }
  body { display: flex; align-items: center; justify-content: center; padding: 24px 0;
    font-family: 'Pretendard', -apple-system, system-ui, sans-serif; }
  .stage { display: flex; gap: 32px; align-items: flex-start; }
  .phone-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .phone-label { font-size: 12px; font-weight: 500; color: #535862; }
  .tweaks { position: fixed; right: 20px; bottom: 20px; width: 280px;
    background: #fff; border: 1px solid #d5d7da; border-radius: 14px;
    box-shadow: 0 12px 32px rgba(10,13,18,.14); padding: 14px 16px;
    z-index: 100; display: none; }
  .tweaks.open { display: block; }
  .tweaks h4 { margin: 0 0 10px; font-size: 13px; font-weight: 700; color: #181d27; letter-spacing: -0.01em; }
  .tweaks .row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .tweaks label { font-size: 11px; font-weight: 500; color: #535862; }
  .segmented { display: flex; border: 1px solid #d5d7da; border-radius: 8px; padding: 2px; gap: 2px; }
  .segmented button { flex: 1; padding: 6px 6px; border: none; background: transparent;
    font-family: inherit; font-size: 11px; font-weight: 500; color: #535862; cursor: pointer; border-radius: 6px; }
  .segmented button.active { background: #6938ef; color: #fff; font-weight: 600; }
  *::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>

<div class="tweaks" id="tweaks">
  <h4>Tweaks</h4>
  <div class="row">
    <label>탭 스타일</label>
    <div class="segmented" id="tabStyleSeg">
      <button data-val="pill" class="active">Pill 세그먼티드</button>
      <button data-val="underline">언더라인</button>
    </div>
  </div>
  <div class="row">
    <label>타임라인 비주얼</label>
    <div class="segmented" id="visualSeg">
      <button data-val="number" class="active">번호 원</button>
      <button data-val="avatar">아바타</button>
      <button data-val="stage">단계 목표</button>
    </div>
  </div>
  <div class="row">
    <label>행 간격</label>
    <div class="segmented" id="densitySeg">
      <button data-val="tight" class="active">촴촴</button>
      <button data-val="comfy">여유</button>
    </div>
  </div>
</div>

<script>
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "tabStyle": "pill",
    "timelineVisual": "avatar",
    "rowDensity": "tight"
  }/*EDITMODE-END*/;
  window.__TWEAKS = { ...TWEAK_DEFAULTS };
</script>

<script src="dccf96a7-939a-4174-a7cc-cb16fc4eaf85" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="9003628e-5866-4f88-9255-a5259e9a16ef" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="f0a17f0f-6978-4d47-803c-2e7fe6d1a627" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ca4ab280-2fb9-4137-bd92-76e04bc1fd9a"></script>
<script type="text/babel" src="7fae5153-2e85-456a-9f6c-2d46918217f5"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function PhoneShell({ children }) {
  const W = 390, H = 844;
  return (
    <div style={{
      width: W, height: H, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: 'Pretendard, -apple-system, system-ui, sans-serif',
    }}>
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      <div style={{
        position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10,
        padding: '18px 32px 0', display: 'flex', justifyContent: 'space-between',
        alignItems: 'center', color: '#000',
      }}>
        <span style={{ fontSize: 15, fontWeight: 600, letterSpacing: '-0.01em' }}>10:34</span>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center', marginRight: -6 }}>
          <svg width="17" height="11" viewBox="0 0 17 11"><rect x="0" y="7" width="3" height="4" rx="0.6" fill="#000"/><rect x="4.5" y="5" width="3" height="6" rx="0.6" fill="#000"/><rect x="9" y="2.5" width="3" height="8.5" rx="0.6" fill="#000"/><rect x="13.5" y="0" width="3" height="11" rx="0.6" fill="#000"/></svg>
          <svg width="15" height="11" viewBox="0 0 15 11"><path d="M7.5 3c2 0 3.8.8 5.1 2.1l1-1c-1.6-1.6-3.8-2.6-6.1-2.6S2.9 2.5 1.3 4.1l1 1C3.7 3.8 5.5 3 7.5 3zM7.5 6.1c1.2 0 2.3.5 3.1 1.3l1-1c-1.1-1.1-2.5-1.7-4.1-1.7s-3 .6-4.1 1.7l1 1c.8-.8 1.9-1.3 3.1-1.3zM7.5 9.4c.7 0 1.3.6 1.3 1.3 0 .1 0 .2-.1.3L7.5 13l-1.2-2c0-.1-.1-.2-.1-.3 0-.7.6-1.3 1.3-1.3z" fill="#000"/></svg>
          <svg width="24" height="11" viewBox="0 0 24 11"><rect x="0.5" y="0.5" width="20" height="10" rx="3" stroke="#000" strokeOpacity="0.35" fill="none"/><rect x="2" y="2" width="17" height="7" rx="1.5" fill="#000"/><path d="M22 4v3c.6-.2 1-.8 1-1.5S22.6 4.2 22 4z" fill="#000" fillOpacity="0.4"/></svg>
        </div>
      </div>
      <div style={{
        position: 'absolute', bottom: 8, left: 0, right: 0, zIndex: 60,
        display: 'flex', justifyContent: 'center', pointerEvents: 'none',
      }}>
        <div style={{ width: 139, height: 5, borderRadius: 100, background: 'rgba(0,0,0,0.3)' }}/>
      </div>
      <div style={{ height: '100%', paddingTop: 54, display: 'flex', flexDirection: 'column' }}>
        {children}
      </div>
    </div>
  );
}

function StageDetailScreen() {
  const [tab, setTab] = useState('participants');
  const [tabStyle, setTabStyle] = useState(window.__TWEAKS.tabStyle);
  const [visual, setVisual] = useState(window.__TWEAKS.timelineVisual);
  const [density, setDensity] = useState(window.__TWEAKS.rowDensity);
  const [sheetRound, setSheetRound] = useState(null);

  useEffect(() => {
    const handler = (e) => {
      const d = e.detail || {};
      if (d.tabStyle !== undefined) setTabStyle(d.tabStyle);
      if (d.timelineVisual !== undefined) setVisual(d.timelineVisual);
      if (d.rowDensity !== undefined) setDensity(d.rowDensity);
    };
    window.addEventListener('tweaks-change', handler);
    return () => window.removeEventListener('tweaks-change', handler);
  }, []);

  return (
    <PhoneShell>
      {/* 헤더 — 뒤로가기만 */}
      <div style={{ flexShrink: 0, background: '#fff',
        padding: '4px 8px 8px', display: 'flex', alignItems: 'center' }}>
        <button style={{
          width: 40, height: 40, borderRadius: 8, border: 'none',
          background: 'transparent', display: 'flex', alignItems: 'center',
          justifyContent: 'center', cursor: 'pointer', padding: 0,
        }}>
          <Icon name="chevron-left" size={24} color="var(--fg1)" strokeWidth={2}/>
        </button>
      </div>
      {/* 스크롤 본문 */}
      <div style={{ flex: 1, overflowY: 'auto', background: 'var(--gray-50)' }}>
        <div style={{ background: '#fff', paddingBottom: 4 }}>
          <StageSummaryCard/>
        </div>
        <StageDetailTabs active={tab} onChange={setTab} style={tabStyle}/>
        {tab === 'participants' && <ParticipantsTab visual={visual} density={density}
          onTapPlan={(p) => setSheetRound(p.idx)}/>}
        {tab === 'rate' && <EmptyTabContent label="이율 내역"/>}
        {tab === 'progress' && <EmptyTabContent label="진행 내역"/>}
        {tab === 'chat' && <EmptyTabContent label="채팅"/>}
      </div>
      <JoinSimSheet open={sheetRound !== null} onClose={() => setSheetRound(null)}
        totalRounds={13} monthly={105120} initialRound={sheetRound || 4}/>
    </PhoneShell>
  );
}

function App() {
  return (
    <div className="stage">
      <div className="phone-wrap">
        <StageDetailScreen/>
        <div className="phone-label">아임인 · 스테이지 상세 (참여자 탭)</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
  const tweaksEl = document.getElementById('tweaks');
  window.addEventListener('message', (e) => {
    if (e.data?.type === '__activate_edit_mode') tweaksEl.classList.add('open');
    if (e.data?.type === '__deactivate_edit_mode') tweaksEl.classList.remove('open');
  });
  function bindSeg(segId, key) {
    const seg = document.getElementById(segId);
    seg.querySelectorAll('button').forEach(b => {
      b.addEventListener('click', () => {
        seg.querySelectorAll('button').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        const val = b.dataset.val;
        window.__TWEAKS[key] = val;
        window.dispatchEvent(new CustomEvent('tweaks-change', { detail: { [key]: val } }));
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
      });
    });
  }
  bindSeg('tabStyleSeg', 'tabStyle');
  bindSeg('visualSeg', 'timelineVisual');
  bindSeg('densitySeg', 'rowDensity');

  function syncSeg(id, key) {
    document.querySelectorAll('#' + id + ' button').forEach(b => {
      b.classList.toggle('active', String(b.dataset.val) === String(window.__TWEAKS[key]));
    });
  }
  syncSeg('tabStyleSeg', 'tabStyle');
  syncSeg('visualSeg', 'timelineVisual');
  syncSeg('densitySeg', 'rowDensity');

  window.parent.postMessage({ type: '__edit_mode_available' }, '*');
</script>


</body></html>
