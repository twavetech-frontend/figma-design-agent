name: Sync Design Tokens

on:
  repository_dispatch:
    types: [tokens-updated]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Fetch tokens.json and sync-to-agent.js from design-system
        run: |
          mkdir -p /tmp/ds-build
          curl -sL https://raw.githubusercontent.com/twavetech-frontend/design-system/main/tokens.json -o /tmp/ds-build/tokens.json
          curl -sL https://raw.githubusercontent.com/twavetech-frontend/design-system/main/sync-to-agent.js -o /tmp/ds-build/sync-to-agent.mjs

      - name: Patch Dark-mode exclusion filter
        # 업스트림 필터 includes('dark mode') 는 set 키 "1. Color modes/Dark"
        # 를 못 걸러 Dark 값이 Light 를 override 한다 → "color modes/dark" 로 교정.
        # 업스트림이 고쳐지면 grep 가드로 자동 무효화.
        run: |
          if grep -q "includes('dark mode')" /tmp/ds-build/sync-to-agent.mjs; then
            sed -i "s#includes('dark mode')#includes('color modes/dark')#" /tmp/ds-build/sync-to-agent.mjs
            echo "Patched sync-to-agent.mjs — Dark-mode exclusion filter fixed"
          fi

      - name: Generate DESIGN_TOKENS.md and TOKEN_MAP.json
        run: node /tmp/ds-build/sync-to-agent.mjs --out $GITHUB_WORKSPACE/ds

      - name: Verify Light-mode values
        run: |
          BG=$(python3 -c "import json; print(json.load(open('$GITHUB_WORKSPACE/ds/TOKEN_MAP.json'))['--colors-background-bgPrimary']['value'])")
          if [ "$BG" = "#000000" ]; then
            echo "ERROR: bg-primary=#000000 — DARK mode regression, patch failed"
            exit 1
          fi
          echo "OK: bg-primary=$BG (Light mode)"

      - name: Commit updated tokens
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ds/DESIGN_TOKENS.md ds/TOKEN_MAP.json
          git commit -m "sync: design tokens updated from design-system" || echo "No changes to commit"
          git push
